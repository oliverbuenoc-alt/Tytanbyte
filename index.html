<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TITANBYTE | Hardware de Alto Rendimiento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #8b5cf6; --bg: #05070b; --card: #111827; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; overflow-x: hidden; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: var(--card); border: 1px solid #1f2937; border-radius: 16px; padding: 15px; transition: 0.3s; }
        .card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .btn { background: var(--primary); padding: 10px; border-radius: 8px; width: 100%; font-weight: 700; cursor: pointer; border: none; transition: 0.3s; }
        .btn:disabled { background: #374151; cursor: not-allowed; }
        #panelCarrito { position: fixed; top: 0; right: -450px; width: 400px; height: 100%; background: #0b0f15; padding: 25px; transition: 0.4s; z-index: 9999; border-left: 1px solid #1f2937; overflow-y: auto; }
        header { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; background: rgba(5,7,11,0.9); backdrop-filter: blur(10px); position: sticky; top:0; z-index: 50; }
    </style>
</head>
<body>
    <header>
        <div class="text-3xl font-black text-purple-500">TITANBYTE</div>
        <input id="search" placeholder="Buscar entre 100+ productos..." class="bg-gray-800 p-2 rounded-lg w-1/3">
        <div onclick="document.getElementById('panelCarrito').style.right='0'" class="cursor-pointer">🛒 <span id="count">0</span></div>
    </header>

    <div id="grid" class="grid"></div>

    <div id="panelCarrito">
        <h2 class="text-2xl text-purple-500">Carrito</h2>
        <div id="items" class="mt-5"></div>
        <h3 class="mt-5">Total: <span id="totalText">0€</span></h3>
        <div id="paypal-button-container" class="mt-5"></div>
        <button onclick="document.getElementById('panelCarrito').style.right='-450px'" class="btn mt-4 bg-gray-700">Cerrar</button>
    </div>
    <script>
    // 1. Generador de 100 Productos
    const productos = Array.from({length: 100}, (_, i) => ({
        id: i,
        n: `Hardware Pro ${i + 1}`,
        c: i % 2 === 0 ? "Gaming" : "Oficina",
        precio: Math.floor(Math.random() * 800) + 50,
        stock: Math.floor(Math.random() * 20) + 1,
        img: `https://picsum.photos/seed/${i}/400/300`, // Imágenes automáticas
        tipo: i % 10 === 0 ? "viral" : "normal"
    }));

    let carrito = JSON.parse(localStorage.getItem('titanByteCart')) || [];

    // 2. Renderizado de Productos
    const render = (lista) => {
        document.getElementById("grid").innerHTML = lista.map(p => `
            <div class="card ${p.stock <= 0 ? 'opacity-50' : ''}">
                <img loading="lazy" src="${p.img}" class="rounded-lg mb-3">
                <h3 class="font-bold">${p.n}</h3>
                <p class="text-purple-500 font-black text-xl">${p.precio}€</p>
                <p class="text-gray-400 text-sm mb-3">${p.stock > 0 ? 'Stock: '+p.stock : 'Agotado'}</p>
                <button class="btn" ${p.stock <= 0 ? 'disabled' : ''} onclick='comprar(${JSON.stringify(p).replace(/"/g, "&quot;")})'>
                    ${p.stock > 0 ? 'Añadir a la Build' : 'Sin Stock'}
                </button>
            </div>
        `).join("");
    };

    // 3. Lógica de Compra y Carrito
    const comprar = (p) => {
        let prod = productos.find(x => x.id === p.id);
        if (prod.stock > 0) {
            prod.stock--;
            carrito.push(prod);
            localStorage.setItem('titanByteCart', JSON.stringify(carrito));
            actualizarUI();
            render(productos);
        }
    };

    const actualizarUI = () => {
        document.getElementById("count").innerText = carrito.length;
        document.getElementById("totalText").innerText = carrito.reduce((a, b) => a + b.precio, 0) + "€";
        document.getElementById("items").innerHTML = carrito.map(p => `<div class="border-b border-gray-800 p-2">${p.n} - ${p.precio}€</div>`).join("");
    };

    // 4. Buscador
    document.getElementById("search").addEventListener("input", (e) => {
        const busqueda = e.target.value.toLowerCase();
        render(productos.filter(p => p.n.toLowerCase().includes(busqueda)));
    });

    // PayPal
    paypal.Buttons({
        createOrder: (data, actions) => actions.order.create({ purchase_units: [{ amount: { value: carrito.reduce((a, b) => a + b.precio, 0).toFixed(2) } }] }),
        onApprove: (data, actions) => actions.order.capture().then(() => alert("Compra TitanByte realizada"))
    }).render("#paypal-button-container");

    // Inicialización
    render(productos);
    actualizarUI();
</script>
