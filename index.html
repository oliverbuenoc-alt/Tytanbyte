<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>TitanByte Deals | Top Ventas</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.paypal.com/sdk/js?client-id=AQ0-loNUSHmKJ0yAqvJaGxQj8bvMpKc4_cAzd2rLPURK0VPhIpvp-fsAU5xAOawA9zYKEJmdOukeikNi&currency=EUR"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Inter,sans-serif;
background:#05070b;
color:white;
overflow-x:hidden;
}

header{
position:sticky;
top:0;
z-index:999;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 30px;
background:rgba(0,0,0,.85);
backdrop-filter:blur(20px);
border-bottom:1px solid #1f2937;
gap:20px;
}

.logo{
font-size:34px;
font-weight:900;
color:#ff6a00;
}

.search{
width:500px;
max-width:100%;
padding:14px;
border:none;
border-radius:14px;
background:#111827;
color:white;
}

.cart{
background:#ff6a00;
padding:12px 20px;
border-radius:14px;
font-weight:800;
}

.hero{
padding:100px 8%;
text-align:center;
background:
linear-gradient(
180deg,
rgba(255,106,0,.15),
transparent
);
}

.hero h1{
font-size:68px;
font-weight:900;
line-height:1;
margin-bottom:20px;
}

.orange{
color:#ff6a00;
}

.hero p{
font-size:22px;
opacity:.8;
margin-bottom:40px;
}

.stats{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.stat{
padding:16px 25px;
background:#111827;
border-radius:18px;
}

.cta{
margin-top:40px;
padding:18px 45px;
background:#ff6a00;
border:none;
border-radius:18px;
font-size:20px;
font-weight:800;
cursor:pointer;
}

.section{
padding:70px 8%;
}

.title{
font-size:38px;
font-weight:900;
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(260px,1fr));
gap:25px;
}

.card{
background:#111827;
border-radius:26px;
overflow:hidden;
transition:.35s;
border:1px solid rgba(255,255,255,.05);
}

.card:hover{
transform:translateY(-8px);
border-color:#ff6a00;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.info{
padding:18px;
}

.cat{
color:#ff6a00;
font-size:13px;
}

.price{
font-size:28px;
font-weight:900;
margin:12px 0;
color:#ff6a00;
}

.btn{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#ff6a00;
font-weight:800;
color:white;
cursor:pointer;
}

#paypal-button-container{
max-width:600px;
margin:auto;
padding:40px;
}

footer{
padding:50px;
text-align:center;
opacity:.6;
}

</style>

</head>

<body>

<header>

<div class="logo">
TITANBYTE
</div>

<input
class="search"
id="search"
placeholder="Buscar top ventas...">

<div class="cart">
🛒 <span id="count">0</span>
</div>

</header>

<section class="hero">

<h1>

🔥 Productos
<span class="orange">
Virales
</span>

y Top Ventas

</h1>

<p>

Miles de compradores encuentran ofertas cada día

</p>

<div class="stats">

<div class="stat">
⭐ +50.000 clientes
</div>

<div class="stat">
🚚 Envíos rápidos
</div>

<div class="stat">
⚡ Ofertas Flash
</div>

<div class="stat">
🔒 Compra segura
</div>

</div>

<button class="cta">
Ver ofertas
</button>

</section>

<section class="section">

<div class="title">
⚡ Ofertas Flash
</div>

<div id="flash" class="grid"></div>

</section>

<section class="section">

<div class="title">
📈 Tendencias TikTok
</div>

<div id="viral" class="grid"></div>

</section>

<section class="section">

<div class="title">
🛍 Catálogo
</div>

<div id="grid" class="grid"></div>

</section>

<div id="paypal-button-container"></div>

<footer>
TitanByte Deals ©2026
</footer>
<script>

let carrito=0
let total=19.99

const base=[

["Air Fryer","Cocina","https://images.unsplash.com/photo-1585515656973-c7b1f2e6e4f5?q=80&w=900"],

["Robot Aspirador","Hogar","https://images.unsplash.com/photo-1585771724684-38269d6639fd?q=80&w=900"],

["Mini Proyector","TikTok","https://images.unsplash.com/photo-1545239351-1141bd82e8a6?q=80&w=900"],

["Power Bank","Tecnología","https://images.unsplash.com/photo-1609592806596-b43fef0971d4?q=80&w=900"],

["Auriculares Bluetooth","Tecnología","https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=900"],

["Smartwatch","Tecnología","https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=900"],

["Tablet","Tecnología","https://images.unsplash.com/photo-1544244015-0df4b3ffc6b0?q=80&w=900"],

["Silla Oficina","Hogar","https://images.unsplash.com/photo-1505843513577-22bb7d21e455?q=80&w=900"]

]

const productos=[]

for(let i=1;i<=500;i++){

let p=base[i%base.length]

productos.push({

n:p[0]+" "+i,

c:p[1],

img:p[2],

precio:
(Math.floor(Math.random()*250)+20),

tipo:
i%15===0
?"flash":
i%10===0
?"viral":
"normal"

})

}

function card(p){

return `

<div class="card">

<img loading="lazy" src="${p.img}">

<div class="info">

<div class="cat">
${p.c}
</div>

<h3>${p.n}</h3>

<div class="price">
${p.precio}€
</div>

<button
class="btn"
onclick="comprar(${p.precio})">

Añadir

</button>

</div>

</div>

`

}

function render(lista){

grid.innerHTML=
lista.map(card).join("")

}

render(productos)

flash.innerHTML=
productos.filter(x=>x.tipo==="flash").slice(0,8).map(card).join("")

viral.innerHTML=
productos.filter(x=>x.tipo==="viral").slice(0,8).map(card).join("")


function comprar(precio){

carrito++

total+=precio

count.innerText=carrito

}

search.oninput=e=>{

let t=e.target.value.toLowerCase()

render(
productos.filter(
x=>x.n.toLowerCase().includes(t)
))

}

paypal.Buttons({

createOrder:function(data,actions){

return actions.order.create({

purchase_units:[{

amount:{

value:total.toFixed(2)

}

}]

})

},

onApprove:function(data,actions){

return actions.order.capture()
.then(function(details){

alert(
'Pago completado por '
+
details.payer.name.given_name
)

})

}

}).render(
'#paypal-button-container'
)

</script>

</body>
</html>
